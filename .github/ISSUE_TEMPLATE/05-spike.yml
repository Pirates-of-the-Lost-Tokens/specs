name: Spike / Research
description: Investigate a technical question before committing to an approach
labels: ["spike"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question to Answer
      description: What specific question does this spike need to answer?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why do we need this investigation? What decision does it unblock?
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Timebox
      description: Maximum time to spend (e.g. 1 day, 2 days)
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Expected Output
      description: What artifact or decision should come out of this spike?
